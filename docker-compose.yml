services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aj_gym
      POSTGRES_USER: ajgym
      POSTGRES_PASSWORD: ajgym
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ajgym -d aj_gym"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://ajgym:ajgym@db:5432/aj_gym
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    command: node src/app.js

  frontend:
    build: ./frontend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
